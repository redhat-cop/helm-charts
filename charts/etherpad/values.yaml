# Default values for etherpad.
replicaCount: 1

defaultTitle: "Labs Etherpad"
defaultText: "✍️ Assign yourself a user and share your ideas! ✍️"

image:
  repository: etherpad
  name:
  tag:
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 9001

ingress:
  enabled: false
  hosts:
    - name: etherpad.organization.com
  annotations: {}

route:
  enabled: true
  host: null
  targetPort: http

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  # use DirtyDB
  enabled: true
  annotations: {}
  storageClass:
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /opt/etherpad-lite/var

database:
  enabled: false
  # a database supported by https://www.npmjs.com/package/ueberdb2
  # https://github.com/ether/etherpad-lite/blob/develop/doc/docker.adoc#database
  db_type: mysql
  db_host: mysql.svc
  db_port: 3306
  db_name: etherpad
  db_user: etherpad
  db_pass: password
  db_charset: utf8mb4
