approveManualInstallPlanViaHook: true

# default image pulls from private registry registry.redhat.io
installPlanApproverAndVerifyJobsImagePullSecret: registry-redhat-io-pullsecret

operatorGroups:
- name: argocd-operator
  createNamespace: true
  targetOwnNamespace: false
  otherTargetNamespaces:

operators:
- name: argocd-operator
  channel: alpha
  csv: argocd-operator.v0.10.1
  installPlanApproval: Manual
  source: operatorhubio-catalog
  sourceNamespace: olm
  namespace: argocd-operator
  installPlanVerifierActiveDeadlineSeconds: 1200
  automaticIntermediateManualUpgrades: true
  config:
    env:
    - name: DISABLE_DEFAULT_ARGOCD_INSTANCE
      value: "true"
